<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Microjuegos - Pong, Snake y Breakout</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #111; }
        canvas { border: 4px solid #444; border-radius: 8px; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
    </style>
</head>
<body>

<script>
// ---------------------------------------------------------
// 1. ESCENA DEL MENÚ PRINCIPAL
// ---------------------------------------------------------
class MenuScene extends Phaser.Scene {
    constructor() { super({ key: 'MenuScene' }); }
    create() {
        this.add.text(400, 200, 'MICROJUEGOS', { fontSize: '64px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
        this.add.text(400, 280, 'Completa el objetivo de 5 en cada juego', { fontSize: '24px', fill: '#aaa' }).setOrigin(0.5);

        const boton = this.add.text(400, 400, '▶ INICIAR', { 
            fontSize: '36px', fill: '#0f0', backgroundColor: '#000', padding: { x: 20, y: 10 } 
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });
        
        boton.on('pointerover', () => boton.setStyle({ fill: '#fff', backgroundColor: '#0a0' }));
        boton.on('pointerout', () => boton.setStyle({ fill: '#0f0', backgroundColor: '#000' }));
        boton.on('pointerdown', () => this.scene.start('PongScene'));
    }
}

// ---------------------------------------------------------
// 2. ESCENA DEL PONG (Objetivo: 5 Puntos)
// ---------------------------------------------------------
class PongScene extends Phaser.Scene {
    constructor() { super({ key: 'PongScene' }); }
    create() {
        this.add.rectangle(400, 300, 800, 600, 0x000033);
        this.add.rectangle(400, 300, 4, 600, 0xffffff).setAlpha(0.3);
        this.add.text(400, 30, 'Usa las FLECHAS ARRIBA/ABAJO', { fontSize: '18px', fill: '#aaa' }).setOrigin(0.5);

        this.player = this.add.rectangle(50, 300, 20, 100, 0x00ff00);
        this.cpu = this.add.rectangle(750, 300, 20, 100, 0xff0000);
        this.ball = this.add.circle(400, 300, 10, 0xffffff);
        this.ballVelX = 6; this.ballVelY = 4;

        this.playerScore = 0; this.cpuScore = 0;
        this.scoreText = this.add.text(400, 80, 'Tú: 0  |  CPU: 0', { fontSize: '32px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
        this.cursors = this.input.keyboard.createCursorKeys();
        this.gameEnded = false;
    }

    update() {
        if (this.gameEnded) return;
        if (this.cursors.up.isDown) this.player.y -= 8;
        else if (this.cursors.down.isDown) this.player.y += 8;
        this.player.y = Phaser.Math.Clamp(this.player.y, 50, 550);

        const cpuSpeed = 4.4; 
        if (this.ball.y < this.cpu.y - 10) this.cpu.y -= cpuSpeed;
        else if (this.ball.y > this.cpu.y + 10) this.cpu.y += cpuSpeed;
        this.cpu.y = Phaser.Math.Clamp(this.cpu.y, 50, 550);

        this.ball.x += this.ballVelX; this.ball.y += this.ballVelY;
        if (this.ball.y < 10 || this.ball.y > 590) this.ballVelY = -this.ballVelY;

        if (this.ball.x < 70 && this.ball.x > 40 && Math.abs(this.ball.y - this.player.y) < 60) {
            this.ballVelX = Math.abs(this.ballVelX) + 0.5; this.ballVelY += Phaser.Math.Between(-2, 2); this.ball.x = 75; 
        }
        if (this.ball.x > 730 && this.ball.x < 760 && Math.abs(this.ball.y - this.cpu.y) < 60) {
            this.ballVelX = -(Math.abs(this.ballVelX) + 0.5); this.ballVelY += Phaser.Math.Between(-2, 2); this.ball.x = 725;
        }

        if (this.ball.x < 0) { this.cpuScore++; this.resetBall(); } 
        else if (this.ball.x > 800) { this.playerScore++; this.resetBall(); }

        this.scoreText.setText(`Tú: ${this.playerScore}  |  CPU: ${this.cpuScore}`);
        if (this.playerScore >= 5) this.endGame(true);
        else if (this.cpuScore >= 5) this.endGame(false);
    }

    resetBall() {
        this.ball.x = 400; this.ball.y = 300;
        this.ballVelX = (this.ballVelX > 0 ? -6 : 6); 
        this.ballVelY = Phaser.Math.Between(-4, 4);
        if (this.ballVelY === 0) this.ballVelY = 3;
    }

    endGame(playerWon) {
        this.gameEnded = true;
        if (playerWon) {
            this.add.text(400, 300, '¡NIVEL SUPERADO!', { fontSize: '56px', fill: '#00ff00', fontStyle: 'bold', stroke: '#000', strokeThickness: 6 }).setOrigin(0.5);
            this.time.delayedCall(3000, () => this.scene.start('SnakeScene'));
        } else {
            this.add.text(400, 300, '¡GAME OVER!', { fontSize: '56px', fill: '#ff0000', fontStyle: 'bold', stroke: '#000', strokeThickness: 6 }).setOrigin(0.5);
            this.add.text(400, 430, 'Clic para reintentar', { fontSize: '20px', fill: '#ff0' }).setOrigin(0.5).setInteractive({ useHandCursor: true })
                .on('pointerdown', () => this.scene.start('PongScene'));
        }
    }
}

// ---------------------------------------------------------
// 3. ESCENA DEL SNAKE (Objetivo: 5 Manzanas)
// ---------------------------------------------------------
class SnakeScene extends Phaser.Scene {
    constructor() { super({ key: 'SnakeScene' }); }
    create() {
        this.add.rectangle(400, 300, 800, 600, 0x002200);
        this.add.text(400, 30, 'Usa las FLECHAS para moverte', { fontSize: '18px', fill: '#aaa' }).setOrigin(0.5);
        
        this.gridSize = 20;
        this.snake = [];
        for (let i = 0; i < 3; i++) {
            this.snake.push(this.add.rectangle((20 - i) * this.gridSize, 15 * this.gridSize, this.gridSize - 2, this.gridSize - 2, 0x00ff00));
        }

        this.direction = 'RIGHT'; this.nextDirection = 'RIGHT'; this.score = 0; this.gameEnded = false;
        this.scoreText = this.add.text(400, 80, `Manzanas: ${this.score} / 5`, { fontSize: '32px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
        this.cursors = this.input.keyboard.createCursorKeys();
        this.input.keyboard.on('keydown', this.handleInput, this);

        this.apple = this.add.rectangle(0, 0, this.gridSize - 2, this.gridSize - 2, 0xff0000);
        this.spawnApple();

        this.moveEvent = this.time.addEvent({ delay: 120, callback: this.moveSnake, callbackScope: this, loop: true });
    }

    handleInput(event) {
        if (this.gameEnded) return;
        if (event.code === 'ArrowUp' && this.direction !== 'DOWN') this.nextDirection = 'UP';
        else if (event.code === 'ArrowDown' && this.direction !== 'UP') this.nextDirection = 'DOWN';
        else if (event.code === 'ArrowLeft' && this.direction !== 'RIGHT') this.nextDirection = 'LEFT';
        else if (event.code === 'ArrowRight' && this.direction !== 'LEFT') this.nextDirection = 'RIGHT';
    }

    moveSnake() {
        if (this.gameEnded) return;
        this.direction = this.nextDirection;
        const head = this.snake[0];
        let newX = head.x, newY = head.y;

        if (this.direction === 'UP') newY -= this.gridSize;
        else if (this.direction === 'DOWN') newY += this.gridSize;
        else if (this.direction === 'LEFT') newX -= this.gridSize;
        else if (this.direction === 'RIGHT') newX += this.gridSize;

        if (newX < 0 || newX >= 800 || newY < 0 || newY >= 600) { this.endGame(false); return; }
        for (let i = 0; i < this.snake.length - 1; i++) {
            if (newX === this.snake[i].x && newY === this.snake[i].y) { this.endGame(false); return; }
        }

        const newHead = this.add.rectangle(newX, newY, this.gridSize - 2, this.gridSize - 2, 0x00ff00);
        this.snake.unshift(newHead);

        if (newX === this.apple.x && newY === this.apple.y) {
            this.score++;
            this.scoreText.setText(`Manzanas: ${this.score} / 5`);
            if (this.score >= 5) { this.endGame(true); return; }
            this.spawnApple();
        } else {
            const tail = this.snake.pop(); tail.destroy();
        }
    }

    spawnApple() {
        let validPosition = false;
        while (!validPosition) {
            const x = Phaser.Math.Between(0, 39) * 20;
            const y = Phaser.Math.Between(0, 29) * 20;
            validPosition = !this.snake.some(segment => segment.x === x && segment.y === y);
            if (validPosition) { this.apple.x = x; this.apple.y = y; }
        }
    }

    endGame(playerWon) {
        this.gameEnded = true; this.moveEvent.remove();
        if (playerWon) {
            this.add.text(400, 300, '¡NIVEL SUPERADO!', { fontSize: '56px', fill: '#00ff00', fontStyle: 'bold', stroke: '#000', strokeThickness: 6 }).setOrigin(0.5);
            this.time.delayedCall(3000, () => this.scene.start('BreakoutScene'));
        } else {
            this.add.text(400, 300, '¡GAME OVER!', { fontSize: '56px', fill: '#ff0000', fontStyle: 'bold', stroke: '#000', strokeThickness: 6 }).setOrigin(0.5);
            this.add.text(400, 430, 'Clic para reintentar', { fontSize: '20px', fill: '#ff0' }).setOrigin(0.5).setInteractive({ useHandCursor: true })
                .on('pointerdown', () => this.scene.start('SnakeScene'));
        }
    }
}

// ---------------------------------------------------------
// 4. ESCENA DEL BREAKOUT (Objetivo: 5 Ladrillos) - CORREGIDO
// ---------------------------------------------------------
class BreakoutScene extends Phaser.Scene {
    constructor() { super({ key: 'BreakoutScene' }); }

    create() {
        this.add.rectangle(400, 300, 800, 600, 0x330000);
        this.add.text(400, 30, 'Usa las FLECHAS IZQ/DER o el RATÓN', { fontSize: '18px', fill: '#aaa' }).setOrigin(0.5);

        // Generar textura de 1x1 píxel para los ladrillos
        const graphics = this.add.graphics();
        graphics.fillStyle(0xffffff, 1);
        graphics.fillRect(0, 0, 1, 1);
        graphics.generateTexture('pixel', 1, 1);
        graphics.destroy();

        // Paleta (CORREGIDO: eliminado setImmovable porque StaticBody ya es inamovible)
        this.paddle = this.add.rectangle(400, 550, 100, 20, 0x00aaff);
        this.physics.add.existing(this.paddle, true);

        // Pelota
        this.ball = this.add.circle(400, 500, 10, 0xffffff);
        this.physics.add.existing(this.ball);
        this.ball.body.setCollideWorldBounds(true);
        this.ball.body.setBounce(1, 1);
        this.ball.body.setVelocity(300, -300);

        // Ladrillos (5 en una fila)
        this.bricksDestroyed = 0;
        this.targetBricks = 5;
        this.bricks = this.physics.add.group();
        const colors = [0xff4444, 0xffaa00, 0xffff00, 0x44ff44, 0x4444ff];
        
        for (let i = 0; i < 5; i++) {
            let brick = this.bricks.create(160 + (i * 120), 150, 'pixel');
            brick.setDisplaySize(100, 30);
            brick.setTint(colors[i]);
            brick.body.setImmovable(true);
            brick.body.allowGravity = false;
        }

        this.scoreText = this.add.text(400, 80, `Ladrillos: ${this.bricksDestroyed} / ${this.targetBricks}`, { fontSize: '32px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
        
        this.cursors = this.input.keyboard.createCursorKeys();
        this.gameEnded = false;

        // Colisiones
        this.physics.add.collider(this.ball, this.paddle, this.hitPaddle, null, this);
        this.physics.add.collider(this.ball, this.bricks, this.hitBrick, null, this);
    }

    update() {
        if (this.gameEnded) return;

        // Movimiento de la paleta (Teclado + Ratón)
        if (this.cursors.left.isDown) {
            this.paddle.x -= 8;
        } else if (this.cursors.right.isDown) {
            this.paddle.x += 8;
        } else {
            this.paddle.x += (this.input.activePointer.x - this.paddle.x) * 0.2;
        }
        this.paddle.x = Phaser.Math.Clamp(this.paddle.x, 50, 750);

        // Condición de derrota: la pelota cae por abajo
        if (this.ball.y > 600) {
            this.endGame(false);
        }
    }

    hitPaddle(ball, paddle) {
        let diff = ball.x - paddle.x;
        ball.body.setVelocity(ball.body.velocity.x + (diff * 0.5), -Math.abs(ball.body.velocity.y));
    }

    hitBrick(ball, brick) {
        brick.destroy();
        this.bricksDestroyed++;
        this.scoreText.setText(`Ladrillos: ${this.bricksDestroyed} / ${this.targetBricks}`);
        
        ball.body.setVelocity(ball.body.velocity.x, -ball.body.velocity.y);

        if (this.bricksDestroyed >= this.targetBricks) {
            this.endGame(true);
        }
    }

    endGame(playerWon) {
        this.gameEnded = true;
        this.ball.body.setVelocity(0, 0);
        this.physics.pause();

        if (playerWon) {
            this.add.text(400, 300, '¡NIVEL SUPERADO!', { fontSize: '56px', fill: '#00ff00', fontStyle: 'bold', stroke: '#000', strokeThickness: 6 }).setOrigin(0.5);
            this.time.delayedCall(3000, () => this.scene.start('MemoryScene'));
        } else {
            this.add.text(400, 300, '¡GAME OVER!', { fontSize: '56px', fill: '#ff0000', fontStyle: 'bold', stroke: '#000', strokeThickness: 6 }).setOrigin(0.5);
            this.add.text(400, 430, 'Clic para reintentar', { fontSize: '20px', fill: '#ff0' }).setOrigin(0.5).setInteractive({ useHandCursor: true })
                .on('pointerdown', () => this.scene.start('BreakoutScene'));
        }
    }
}

// ---------------------------------------------------------
// 5. ESCENA DE MEMORIA (Placeholder)
// ---------------------------------------------------------
class MemoryScene extends Phaser.Scene {
    constructor() { super({ key: 'MemoryScene' }); }
    create() {
        this.add.rectangle(400, 300, 800, 600, 0x330033);
        this.add.text(400, 250, 'MICROJUEGO 4: MEMORIA', { fontSize: '48px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
        this.add.text(400, 320, '(En desarrollo...)', { fontSize: '28px', fill: '#aaa' }).setOrigin(0.5);
        
        const backBtn = this.add.text(400, 420, 'Volver al Menú', { fontSize: '24px', fill: '#ff0', backgroundColor: '#000', padding: {x:10, y:5} })
            .setOrigin(0.5).setInteractive({ useHandCursor: true });
        backBtn.on('pointerdown', () => this.scene.start('MenuScene'));
    }
}

// ---------------------------------------------------------
// CONFIGURACIÓN DEL JUEGO
// ---------------------------------------------------------
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    backgroundColor: '#000033',
    physics: {
        default: 'arcade',
        arcade: { debug: false }
    },
    scene: [MenuScene, PongScene, SnakeScene, BreakoutScene, MemoryScene]
};

const game = new Phaser.Game(config);
</script>

</body>
</html>
