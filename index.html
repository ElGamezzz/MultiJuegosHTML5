<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Microjuegos - Pong y Snake</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #111; }
        canvas { border: 4px solid #444; border-radius: 8px; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
    </style>
</head>
<body>

<script>
// ---------------------------------------------------------
// 1. ESCENA DEL MENÚ PRINCIPAL
// ---------------------------------------------------------
class MenuScene extends Phaser.Scene {
    constructor() { super({ key: 'MenuScene' }); }
    create() {
        this.add.text(400, 200, 'MICROJUEGOS', { fontSize: '64px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
        this.add.text(400, 280, 'Completa el objetivo de 5 en cada juego', { fontSize: '24px', fill: '#aaa' }).setOrigin(0.5);

        const boton = this.add.text(400, 400, '▶ INICIAR', { 
            fontSize: '36px', fill: '#0f0', backgroundColor: '#000', padding: { x: 20, y: 10 } 
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });
        
        boton.on('pointerover', () => boton.setStyle({ fill: '#fff', backgroundColor: '#0a0' }));
        boton.on('pointerout', () => boton.setStyle({ fill: '#0f0', backgroundColor: '#000' }));
        boton.on('pointerdown', () => this.scene.start('PongScene'));
    }
}

// ---------------------------------------------------------
// 2. ESCENA DEL PONG (Objetivo: 5 Puntos)
// ---------------------------------------------------------
class PongScene extends Phaser.Scene {
    constructor() { super({ key: 'PongScene' }); }
    create() {
        this.add.rectangle(400, 300, 800, 600, 0x000033);
        this.add.rectangle(400, 300, 4, 600, 0xffffff).setAlpha(0.3);
        this.add.text(400, 30, 'Usa las FLECHAS ARRIBA/ABAJO', { fontSize: '18px', fill: '#aaa' }).setOrigin(0.5);

        this.player = this.add.rectangle(50, 300, 20, 100, 0x00ff00);
        this.cpu = this.add.rectangle(750, 300, 20, 100, 0xff0000);
        this.ball = this.add.circle(400, 300, 10, 0xffffff);
        this.ballVelX = 6; this.ballVelY = 4;

        this.playerScore = 0; this.cpuScore = 0;
        this.scoreText = this.add.text(400, 80, 'Tú: 0  |  CPU: 0', { fontSize: '32px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
        this.cursors = this.input.keyboard.createCursorKeys();
        this.gameEnded = false;
    }

    update() {
        if (this.gameEnded) return;

        if (this.cursors.up.isDown) this.player.y -= 8;
        else if (this.cursors.down.isDown) this.player.y += 8;
        this.player.y = Phaser.Math.Clamp(this.player.y, 50, 550);

        const cpuSpeed = 4.4; 
        if (this.ball.y < this.cpu.y - 10) this.cpu.y -= cpuSpeed;
        else if (this.ball.y > this.cpu.y + 10) this.cpu.y += cpuSpeed;
        this.cpu.y = Phaser.Math.Clamp(this.cpu.y, 50, 550);

        this.ball.x += this.ballVelX;
        this.ball.y += this.ballVelY;

        if (this.ball.y < 10 || this.ball.y > 590) this.ballVelY = -this.ballVelY;

        if (this.ball.x < 70 && this.ball.x > 40 && Math.abs(this.ball.y - this.player.y) < 60) {
            this.ballVelX = Math.abs(this.ballVelX) + 0.5; 
            this.ballVelY += Phaser.Math.Between(-2, 2); 
            this.ball.x = 75; 
        }
        if (this.ball.x > 730 && this.ball.x < 760 && Math.abs(this.ball.y - this.cpu.y) < 60) {
            this.ballVelX = -(Math.abs(this.ballVelX) + 0.5); 
            this.ballVelY += Phaser.Math.Between(-2, 2);
            this.ball.x = 725;
        }

        if (this.ball.x < 0) { this.cpuScore++; this.resetBall(); } 
        else if (this.ball.x > 800) { this.playerScore++; this.resetBall(); }

        this.scoreText.setText(`Tú: ${this.playerScore}  |  CPU: ${this.cpuScore}`);

        if (this.playerScore >= 5) this.endGame(true);
        else if (this.cpuScore >= 5) this.endGame(false);
    }

    resetBall() {
        this.ball.x = 400; this.ball.y = 300;
        this.ballVelX = (this.ballVelX > 0 ? -6 : 6); 
        this.ballVelY = Phaser.Math.Between(-4, 4);
        if (this.ballVelY === 0) this.ballVelY = 3;
    }

    endGame(playerWon) {
        this.gameEnded = true;
        if (playerWon) {
            this.add.text(400, 300, '¡NIVEL SUPERADO!', { fontSize: '56px', fill: '#00ff00', fontStyle: 'bold', stroke: '#000', strokeThickness: 6 }).setOrigin(0.5);
            this.time.delayedCall(3000, () => this.scene.start('SnakeScene'));
        } else {
            this.add.text(400, 300, '¡GAME OVER!', { fontSize: '56px', fill: '#ff0000', fontStyle: 'bold', stroke: '#000', strokeThickness: 6 }).setOrigin(0.5);
            this.add.text(400, 430, 'Clic para reintentar', { fontSize: '20px', fill: '#ff0' }).setOrigin(0.5).setInteractive({ useHandCursor: true })
                .on('pointerdown', () => this.scene.start('PongScene'));
        }
    }
}

// ---------------------------------------------------------
// 3. ESCENA DEL SNAKE (Objetivo: 5 Manzanas)
// ---------------------------------------------------------
class SnakeScene extends Phaser.Scene {
    constructor() { super({ key: 'SnakeScene' }); }

    create() {
        this.add.rectangle(400, 300, 800, 600, 0x002200);
        this.add.text(400, 30, 'Usa las FLECHAS para moverte', { fontSize: '18px', fill: '#aaa' }).setOrigin(0.5);
        
        this.gridSize = 20;
        this.cols = 800 / this.gridSize;
        this.rows = 600 / this.gridSize;

        // Serpiente (empieza en el centro con 3 segmentos)
        this.snake = [];
        const startX = 20;
        const startY = 15;
        for (let i = 0; i < 3; i++) {
            this.snake.push(this.add.rectangle((startX - i) * this.gridSize, startY * this.gridSize, this.gridSize - 2, this.gridSize - 2, 0x00ff00));
        }

        this.direction = 'RIGHT';
        this.nextDirection = 'RIGHT';
        this.score = 0;
        this.gameEnded = false;

        this.scoreText = this.add.text(400, 80, `Manzanas: ${this.score} / 5`, { fontSize: '32px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5);

        // Controles
        this.cursors = this.input.keyboard.createCursorKeys();
        this.input.keyboard.on('keydown', this.handleInput, this);

        // Manzana
        this.apple = this.add.rectangle(0, 0, this.gridSize - 2, this.gridSize - 2, 0xff0000);
        this.spawnApple();

        // Temporizador de movimiento (se mueve cada 120ms)
        this.moveEvent = this.time.addEvent({
            delay: 120,
            callback: this.moveSnake,
            callbackScope: this,
            loop: true
        });
    }

    handleInput(event) {
        if (this.gameEnded) return;
        switch (event.code) {
            case 'ArrowUp': if (this.direction !== 'DOWN') this.nextDirection = 'UP'; break;
            case 'ArrowDown': if (this.direction !== 'UP') this.nextDirection = 'DOWN'; break;
            case 'ArrowLeft': if (this.direction !== 'RIGHT') this.nextDirection = 'LEFT'; break;
            case 'ArrowRight': if (this.direction !== 'LEFT') this.nextDirection = 'RIGHT'; break;
        }
    }

    moveSnake() {
        if (this.gameEnded) return;

        this.direction = this.nextDirection;
        const head = this.snake[0];
        let newX = head.x;
        let newY = head.y;

        if (this.direction === 'UP') newY -= this.gridSize;
        else if (this.direction === 'DOWN') newY += this.gridSize;
        else if (this.direction === 'LEFT') newX -= this.gridSize;
        else if (this.direction === 'RIGHT') newX += this.gridSize;

        // 1. Comprobar colisión con paredes
        if (newX < 0 || newX >= 800 || newY < 0 || newY >= 600) {
            this.endGame(false);
            return;
        }

        // 2. Comprobar colisión con el propio cuerpo (ignoramos la cola porque se moverá)
        for (let i = 0; i < this.snake.length - 1; i++) {
            if (newX === this.snake[i].x && newY === this.snake[i].y) {
                this.endGame(false);
                return;
            }
        }

        // 3. Mover la serpiente: crear nueva cabeza
        const newHead = this.add.rectangle(newX, newY, this.gridSize - 2, this.gridSize - 2, 0x00ff00);
        this.snake.unshift(newHead);

        // 4. Comprobar si comió manzana
        if (newX === this.apple.x && newY === this.apple.y) {
            this.score++;
            this.scoreText.setText(`Manzanas: ${this.score} / 5`);
            
            if (this.score >= 5) {
                this.endGame(true);
                return;
            }
            this.spawnApple();
        } else {
            // Si no comió, eliminar la cola para mantener el tamaño
            const tail = this.snake.pop();
            tail.destroy();
        }
    }

    spawnApple() {
        let validPosition = false;
        while (!validPosition) {
            const col = Phaser.Math.Between(0, this.cols - 1);
            const row = Phaser.Math.Between(0, this.rows - 1);
            const x = col * this.gridSize;
            const y = row * this.gridSize;

            // Asegurar que no aparezca sobre la serpiente
            validPosition = !this.snake.some(segment => segment.x === x && segment.y === y);
            
            if (validPosition) {
                this.apple.x = x;
                this.apple.y = y;
            }
        }
    }

    endGame(playerWon) {
        this.gameEnded = true;
        this.moveEvent.remove(); // Detener movimiento

        if (playerWon) {
            this.add.text(400, 300, '¡NIVEL SUPERADO!', { fontSize: '56px', fill: '#00ff00', fontStyle: 'bold', stroke: '#000', strokeThickness: 6 }).setOrigin(0.5);
            this.time.delayedCall(3000, () => this.scene.start('BreakoutScene'));
        } else {
            this.add.text(400, 300, '¡GAME OVER!', { fontSize: '56px', fill: '#ff0000', fontStyle: 'bold', stroke: '#000', strokeThickness: 6 }).setOrigin(0.5);
            this.add.text(400, 430, 'Clic para reintentar', { fontSize: '20px', fill: '#ff0' }).setOrigin(0.5).setInteractive({ useHandCursor: true })
                .on('pointerdown', () => this.scene.start('SnakeScene'));
        }
    }
}

// ---------------------------------------------------------
// 4. ESCENA DEL BREAKOUT (Placeholder)
// ---------------------------------------------------------
class BreakoutScene extends Phaser.Scene {
    constructor() { super({ key: 'BreakoutScene' }); }
    create() {
        this.add.rectangle(400, 300, 800, 600, 0x330000);
        this.add.text(400, 250, 'MICROJUEGO 3: BREAKOUT', { fontSize: '48px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
        this.add.text(400, 320, '(En desarrollo...)', { fontSize: '28px', fill: '#aaa' }).setOrigin(0.5);
        
        const backBtn = this.add.text(400, 420, 'Volver al Menú', { fontSize: '24px', fill: '#ff0', backgroundColor: '#000', padding: {x:10, y:5} })
            .setOrigin(0.5).setInteractive({ useHandCursor: true });
        backBtn.on('pointerdown', () => this.scene.start('MenuScene'));
    }
}

// ---------------------------------------------------------
// CONFIGURACIÓN DEL JUEGO
// ---------------------------------------------------------
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    backgroundColor: '#000033',
    scene: [MenuScene, PongScene, SnakeScene, BreakoutScene]
};

const game = new Phaser.Game(config);
</script>

</body>
</html>
